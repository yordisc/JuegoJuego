[functions]
  # Carpeta donde Netlify buscará tus scripts
  directory = "netlify/functions"

# Microservicio 1: Scraper (Android)
[functions.check-android]
  # Ejecutar cada 20 minutos
  schedule = "*/20 * * * *"

# Microservicio 1.1: Productor RSS (Android Reddit)
# Desactivado en Netlify: ahora corre desde GitHub Actions para evitar timeout.

# Microservicio 2: GamerPower (PC)
[functions.check-pc]
  # Ejecutar a las 10:00 AM y a las 10:00 PM todos los días
  schedule = "0 10,22 * * *"

# Microservicio 3: Limpieza de expirados (Android + PC)
[functions.clean-expired]
  # Ejecutar cada 30 minutos
  schedule = "*/30 * * * *"

# Microservicio 4: Limpieza de duplicados (Android + PC)
[functions.clean-duplicates]
  # Ejecutar 1 vez al día a las 3:00 AM UTC
  schedule = "0 3 * * *"
