[functions]
  # Carpeta donde Netlify buscará tus scripts
  directory = "netlify/functions"

# Microservicio 1: Scraper (Android)
[functions.check-android]
  # Ejecutar cada 20 minutos
  schedule = "*/20 * * * *"

# Microservicio 1.1: Productor RSS (Android Reddit)
# Desactivado en Netlify: ahora corre desde GitHub Actions para evitar timeout.

# Microservicio 2: GamerPower (PC)
[functions.check-pc]
  # Ejecutar a las 10:00 AM y a las 10:00 PM todos los días
  schedule = "0 10,22 * * *"

# Microservicio 3: Limpieza de expirados (Android + PC)
[functions.clean-expired]
  # Ejecutar cada 30 minutos
  schedule = "*/30 * * * *"

# Microservicio 4: Limpieza de duplicados (Android + PC)
[functions.clean-duplicates]
  # Ejecutar cada 12 horas
  schedule = "0 */12 * * *"

# Microservicio 5: Limpieza diaria de mensajes huerfanos en Telegram
[functions.clean-orphan-telegram]
  # Ejecutar 1 vez al día a las 03:30 AM UTC
  schedule = "30 3 * * *"

# Microservicio 6: Verificacion diaria de publicaciones Android en memoria
[functions.verify-android-publications]
  # Ejecutar 1 vez al dia para reconciliar estado memoria <-> Telegram
  schedule = "0 4 * * *"

# Microservicio 7: Reporte diario de estado Android y alerta automatica
[functions.android-status-report]
  # Ejecutar diario despues de la reconciliacion
  schedule = "10 4 * * *"

# Microservicio 8: Verificacion diaria de publicaciones PC en memoria
[functions.verify-pc-publications]
  # Ejecutar diario para reconciliar estado memoria <-> Telegram en PC
  schedule = "20 4 * * *"

# Microservicio 9: Reporte diario de estado PC y alerta automatica
[functions.pc-status-report]
  # Ejecutar diario despues de la reconciliacion de PC
  schedule = "30 4 * * *"

# Mantenimiento semanal (manual functions programadas)
[functions.manual-run-all]
  # Primer dia de la semana (lunes) a primera hora: 01:00 UTC
  schedule = "0 1 * * 1"

[functions.manual-status]
  # Snapshot semanal posterior al mantenimiento: 01:20 UTC
  schedule = "20 1 * * 1"

# Manual functions (invocables vía HTTP)
[functions.manual-android-status-report]
  # Ejecutar 1 vez al mes el 1er dia a las 00:00 UTC
  schedule = "0 0 1 * *"

[functions.manual-clean-memory]
  # Ejecutar 1 vez al mes el 1er dia a las 00:10 UTC
  schedule = "10 0 1 * *"

[functions.manual-clean-telegram]
  # Ejecutar 1 vez al mes el 1er dia a las 00:20 UTC
  schedule = "20 0 1 * *"

[functions.manual-delete-smoke]
  # Ejecutar 1 vez al mes el 1er dia a las 00:30 UTC
  schedule = "30 0 1 * *"

[functions.manual-pc-status-report]
  # Ejecutar 1 vez al mes el 1er dia a las 00:40 UTC
  schedule = "40 0 1 * *"
