name: Producer PC Queue

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

concurrency:
  group: producer-pc-queue
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  produce-pc-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build PC queues
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
        run: node scripts/github-pc.js
