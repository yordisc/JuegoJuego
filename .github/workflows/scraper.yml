name: Producer Android Queue

on:
  workflow_dispatch:
  schedule:
    - cron: "7,27,47 * * * *"

concurrency:
  group: producer-android-queue
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  produce-android-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Android queues
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          ANDROID_STATE_LOCK_TTL_MS: "5000"
          ANDROID_STATE_LOCK_RETRIES: "20"
          ANDROID_STATE_LOCK_RETRY_DELAY_MS: "500"
          ANDROID_PRODUCER_DEBUG: "1"
          ANDROID_PRODUCER_DEBUG_SAMPLES: "5"
          ANDROID_PRODUCER_EXPIRATION_ENABLED: "false"
          ANDROID_PRODUCER_MIN_ACTIVE_IDS: "10"
          ANDROID_PRODUCER_EXPIRATION_GRACE_HOURS: "24"
          ANDROID_PRODUCER_MAX_EXPIRE_RATIO: "0.35"
        run: node scripts/github-android.js
