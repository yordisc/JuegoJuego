name: Producer Android RSS Queue

on:
  workflow_dispatch:
  schedule:
    - cron: "13 */4 * * *"

concurrency:
  group: producer-android-rss-queue
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  produce-android-rss-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Android RSS queue + infer expired
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          ANDROID_STATE_LOCK_RETRIES: "20"
          ANDROID_STATE_LOCK_RETRY_DELAY_MS: "500"
          ANDROID_RSS_FEED_URL: "https://www.reddit.com/r/googleplaydeals/new.rss"
          ANDROID_RSS_MAX_ITEMS: "50"
          ANDROID_RSS_EXPIRATION_ENABLED: "true"
          ANDROID_RSS_EXPIRATION_GRACE_HOURS: "24"
          ANDROID_RSS_MIN_ACTIVE_IDS: "10"
          ANDROID_RSS_MAX_EXPIRE_RATIO: "0.35"
          ANDROID_RSS_DETAILS_DELAY_MS: "250"
          ANDROID_RSS_SKIP_CLEANUP: "true"
        run: npm run produce:android:rss
