name: Android Expiration Scanner

on:
  workflow_dispatch: {}
  schedule:
    - cron: "23 2,14 * * *"

concurrency:
  group: producer-android-expiration
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan-android-expired:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Revalidate Android expirations
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          ANDROID_STATE_LOCK_TTL_MS: "5000"
          ANDROID_STATE_LOCK_RETRIES: "20"
          ANDROID_STATE_LOCK_RETRY_DELAY_MS: "500"
          ANDROID_EXPIRATION_SCAN_MAX_EXPIRE_RATIO: "0.35"
          ANDROID_EXPIRATION_SCAN_DETAILS_DELAY_MS: "750"
          ANDROID_EXPIRATION_SCAN_SKIP_CLEANUP: "true"
        run: npm run produce:android:expired
